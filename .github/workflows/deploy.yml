name: Deploy web til FTP

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle (expo export)
        working-directory: apps/nobel-drop
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_APP_URL: https://shop.nobeldrop.no
          EXPO_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.EXPO_PUBLIC_VAPID_PUBLIC_KEY }}
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
        run: npx expo export --platform web

      - name: Verify build output
        run: |
          test -f apps/nobel-drop/dist/index.html || (echo "Mangler dist/index.html — bygget feilet" && exit 1)
          ls -la apps/nobel-drop/dist | head -20

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./apps/nobel-drop/dist/
          server-dir: /public_html/shop.nobeldrop.no/
          # NB: protocol=ftp er ren, ukryptert FTP. Brukes som diagnose.
          # Bytt til ftps (explicit, port 21) eller ftps-legacy (implicit, port 990)
          # når vi vet hva Dedia støtter.
          protocol: ftp
          port: 21
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
