name: Deploy til FTP

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # ============================================================
  # Marketing — nobeldrop.no (root) → /public_html/
  # ============================================================
  deploy-marketing:
    name: Deploy marketing til nobeldrop.no
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build marketing site (Astro)
        working-directory: apps/nobel-marketing
        run: npm run build

      - name: Verify marketing build
        run: |
          test -f apps/nobel-marketing/dist/index.html || (echo "Mangler dist/index.html" && exit 1)
          test -f apps/nobel-marketing/dist/.htaccess || echo "ADVARSEL: .htaccess ikke i dist"
          ls -la apps/nobel-marketing/dist | head -25

      - name: Deploy marketing via FTP til /public_html/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./apps/nobel-marketing/dist/
          server-dir: /public_html/
          protocol: ftp
          port: 21
          # State-file lokasjon: /public_html/.ftp-deploy-sync-state.json
          # Action rører kun filer den selv har deployet — shop-undermappen er trygg.
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
            shop.nobeldrop.no/**
            shop.nobeldrop.no
            app.nobeldrop.no/**
            app.nobeldrop.no

  # ============================================================
  # App — shop.nobeldrop.no → /public_html/shop.nobeldrop.no/
  # ============================================================
  deploy-app:
    name: Deploy app til shop.nobeldrop.no
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle (expo export)
        working-directory: apps/nobel-drop
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_APP_URL: https://shop.nobeldrop.no
          EXPO_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.EXPO_PUBLIC_VAPID_PUBLIC_KEY }}
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
        run: npx expo export --platform web

      - name: Verify app build
        run: |
          test -f apps/nobel-drop/dist/index.html || (echo "Mangler dist/index.html" && exit 1)
          ls -la apps/nobel-drop/dist | head -20

      - name: Deploy app via FTP til /public_html/shop.nobeldrop.no/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./apps/nobel-drop/dist/
          server-dir: /public_html/shop.nobeldrop.no/
          protocol: ftp
          port: 21
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
